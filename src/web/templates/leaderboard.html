{% extends "base.html" %}

{% block title %}华夏篮球联赛教练模拟器 - 数据排行榜{% endblock %}

{% block content %}
<div class="leaderboard-container">
    <div class="roster-header">
        <div>
            <h1>📊 数据排行榜</h1>
            <p class="text-muted">查看各项数据的前20名球员和球队战绩</p>
        </div>
        <div>
            <button class="btn btn-secondary" onclick="GameApp.showPage('dashboard')">
                ← 返回控制台
            </button>
        </div>
    </div>

    <!-- 常规赛/季后赛/总数据/球队战绩切换按钮 -->
    <div class="card mb-2" id="leaderboard-mode-card">
        <div class="card-body">
            <div class="leaderboard-mode-toggle">
                <button class="btn btn-mode active" id="btn-regular-mode" onclick="GameApp.switchLeaderboardMode('regular')">
                    📅 常规赛数据
                </button>
                <button class="btn btn-mode" id="btn-playoff-mode" onclick="GameApp.switchLeaderboardMode('playoff')">
                    🏆 季后赛数据
                </button>
                <button class="btn btn-mode" id="btn-total-mode" onclick="GameApp.switchLeaderboardMode('total')">
                    📈 总数据
                </button>
                <button class="btn btn-mode" id="btn-team-standings-mode" onclick="GameApp.switchLeaderboardMode('team-standings')">
                    🏅 球队战绩榜
                </button>
            </div>
            <!-- 球员类型筛选按钮 -->
            <div class="leaderboard-player-filter" id="leaderboard-player-filter" style="margin-top: 10px;">
                <button class="btn btn-filter active" id="btn-all-players" onclick="GameApp.switchPlayerFilter('all')">
                    👥 所有球员
                </button>
                <button class="btn btn-filter" id="btn-domestic-players" onclick="GameApp.switchPlayerFilter('domestic')">
                    🇨🇳 本土球员
                </button>
            </div>
        </div>
    </div>

    <!-- 数据类型选择 -->
    <div class="leaderboard-tabs" id="leaderboard-tabs">
        <button class="leaderboard-tab active" data-stat="points" onclick="GameApp.switchLeaderboard('points')">
            🏀 得分榜
        </button>
        <button class="leaderboard-tab" data-stat="rebounds" onclick="GameApp.switchLeaderboard('rebounds')">
            📊 篮板榜
        </button>
        <button class="leaderboard-tab" data-stat="assists" onclick="GameApp.switchLeaderboard('assists')">
            🎯 助攻榜
        </button>
        <button class="leaderboard-tab" data-stat="steals" onclick="GameApp.switchLeaderboard('steals')">
            ✋ 抢断榜
        </button>
        <button class="leaderboard-tab" data-stat="blocks" onclick="GameApp.switchLeaderboard('blocks')">
            🖐️ 盖帽榜
        </button>
    </div>

    <!-- 筛选条件 -->
    <div class="card mb-2" id="leaderboard-filters-card">
        <div class="card-body">
            <div class="grid grid-2" style="max-width: 500px;">
                <div class="form-group" style="margin-bottom: 0;" id="min-games-group">
                    <label class="form-label">最少出场次数</label>
                    <select class="form-control form-select" id="min-games-select" onchange="GameApp.refreshLeaderboard()">
                        <option value="1">1场</option>
                        <option value="3">3场</option>
                        <option value="5" selected>5场</option>
                        <option value="10">10场</option>
                        <option value="15">15场</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">显示人数</label>
                    <select class="form-control form-select" id="top-n-select" onchange="GameApp.refreshLeaderboard()">
                        <option value="10">前10名</option>
                        <option value="20" selected>前20名</option>
                        <option value="50">前50名</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- 排行榜表格 (球员数据) -->
    <div class="card" id="player-leaderboard-card">
        <div class="card-header" id="leaderboard-title">🏀 得分榜</div>
        <div class="card-body">
            <div class="table-container">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th style="width: 60px;">排名</th>
                            <th>球员</th>
                            <th>球队</th>
                            <th>场次</th>
                            <th id="stat-column-header">场均得分</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>
            <div id="no-leaderboard-data" class="text-center text-muted hidden" style="padding: 40px;">
                暂无数据，请等待比赛进行后查看
            </div>
        </div>
    </div>

    <!-- 球队战绩排行榜表格 -->
    <div class="card hidden" id="team-standings-leaderboard-card">
        <div class="card-header">🏅 球队战绩榜</div>
        <div class="card-body">
            <div class="table-container">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th style="width: 60px;">排名</th>
                            <th>球队</th>
                            <th>胜</th>
                            <th>负</th>
                            <th>胜率</th>
                            <th>落后</th>
                        </tr>
                    </thead>
                    <tbody id="team-standings-leaderboard-body">
                        <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>
            <div id="no-team-standings-data" class="text-center text-muted hidden" style="padding: 40px;">
                暂无数据，请等待比赛进行后查看
            </div>
        </div>
    </div>
</div>

<style>
.leaderboard-mode-toggle {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

.btn-mode {
    padding: 10px 24px;
    border: 2px solid var(--primary-color);
    background: transparent;
    color: var(--primary-color);
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-mode:hover {
    background: var(--primary-color);
    color: white;
}

.btn-mode.active {
    background: var(--primary-color);
    color: white;
}

.rank-playoff {
    background: linear-gradient(135deg, #ffc107, #ff9800) !important;
    color: #000 !important;
}

.table-primary {
    background-color: rgba(230, 57, 70, 0.1) !important;
}

.badge-primary {
    background: var(--primary-color);
    color: white;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.75rem;
}
</style>
{% endblock %}
