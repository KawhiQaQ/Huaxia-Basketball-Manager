{% extends "base.html" %}

{% block title %}华夏篮球联赛教练模拟器 - 比赛{% endblock %}

{% block content %}
<div class="match-container">
    <!-- 比赛前状态 -->
    <div id="pre-match-panel">
        <div class="card text-center">
            <div class="card-header">🏀 今日比赛 - 我的球队</div>
            <div class="card-body">
                <div class="match-teams" style="padding: 30px 0;">
                    <div class="match-team">
                        <div class="match-team-name" id="pre-home-team">--</div>
                        <div class="text-muted">主场</div>
                    </div>
                    <div class="match-vs">VS</div>
                    <div class="match-team">
                        <div class="match-team-name" id="pre-away-team">--</div>
                        <div class="text-muted">客场</div>
                    </div>
                </div>
                
                <p class="text-muted" style="margin-bottom: 15px;">
                    点击开始比赛，AI将模拟比赛并生成球员数据
                </p>
                
                <button class="btn btn-primary btn-lg mt-2" id="btn-start-match" onclick="GameApp.startMatch()">
                    🏀 开始比赛
                </button>
            </div>
        </div>
        
        <div class="text-center mt-2">
            <button class="btn btn-secondary" onclick="GameApp.showPage('dashboard')">
                ← 返回控制台
            </button>
        </div>
    </div>
    
    <!-- 模拟中状态提示 - 带进度条 -->
    <div id="llm-simulating-panel" class="hidden">
        <div class="card text-center">
            <div class="card-body" style="padding: 60px 30px;">
                <h3 style="color: var(--primary-color); margin-bottom: 20px;">🏀 比赛模拟中</h3>
                
                <!-- 进度条 -->
                <div class="progress-container" style="max-width: 400px; margin: 0 auto 20px;">
                    <div class="progress" style="height: 20px; background-color: #e9ecef; border-radius: 10px; overflow: hidden;">
                        <div id="match-progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" 
                             role="progressbar" 
                             style="width: 0%; background-color: var(--primary-color); transition: width 0.3s ease;">
                        </div>
                    </div>
                    <p class="text-muted mt-2" id="match-progress-text" style="font-size: 0.9rem;">准备中...</p>
                </div>
                
                <p class="text-muted" style="font-size: 0.85rem;">正在生成比赛数据，请稍候</p>
            </div>
        </div>
    </div>

    <!-- 比赛结果面板 -->
    <div id="match-result-panel" class="hidden">
        <!-- 比分板 -->
        <div class="match-scoreboard">
            <div class="match-teams">
                <div class="match-team">
                    <div class="match-team-name" id="result-home-team">--</div>
                    <div class="match-score" id="result-home-score">0</div>
                </div>
                <div class="match-vs">VS</div>
                <div class="match-team">
                    <div class="match-team-name" id="result-away-team">--</div>
                    <div class="match-score" id="result-away-score">0</div>
                </div>
            </div>
            
            <!-- 节次比分（隐藏，快速模拟不生成） -->
            <div class="quarter-scores hidden" id="quarter-scores"></div>
        </div>

        <!-- 数据统计 - 主队 -->
        <div class="box-score">
            <div class="box-score-header" id="home-box-score-header">主队数据统计</div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>球员</th>
                            <th>得分</th>
                            <th>篮板</th>
                            <th>助攻</th>
                            <th>抢断</th>
                            <th>盖帽</th>
                            <th>失误</th>
                            <th>时间</th>
                        </tr>
                    </thead>
                    <tbody id="home-box-score-body">
                        <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 数据统计 - 客队 -->
        <div class="box-score mt-2">
            <div class="box-score-header" id="away-box-score-header">客队数据统计</div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>球员</th>
                            <th>得分</th>
                            <th>篮板</th>
                            <th>助攻</th>
                            <th>抢断</th>
                            <th>盖帽</th>
                            <th>失误</th>
                            <th>时间</th>
                        </tr>
                    </thead>
                    <tbody id="away-box-score-body">
                        <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="text-center mt-2">
            <button class="btn btn-primary btn-lg" onclick="GameApp.continueAfterMatch()">
                继续游戏 →
            </button>
        </div>
    </div>

    <!-- 无比赛提示 -->
    <div id="no-match-panel" class="hidden">
        <div class="card text-center">
            <div class="card-body" style="padding: 50px;">
                <div style="font-size: 4rem; margin-bottom: 20px;">📅</div>
                <h2>今日无比赛</h2>
                <p class="text-muted">今天是休息日，可以进行训练或交易</p>
                <button class="btn btn-primary mt-2" onclick="GameApp.showPage('dashboard')">
                    返回控制台
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
