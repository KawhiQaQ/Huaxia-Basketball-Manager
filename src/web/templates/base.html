<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}华夏篮球联赛模拟器{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <!-- 导航栏 -->
        <nav class="navbar" id="navbar">
            <div class="nav-brand">
                <a href="/">🏀 华夏篮球联赛模拟器</a>
            </div>
            <div class="nav-links" id="nav-links">
                <a href="/" class="nav-link" data-page="home">主页</a>
                <a href="#" class="nav-link" data-page="dashboard" id="nav-dashboard" style="display:none;">控制台</a>
                <a href="#" class="nav-link" data-page="roster" id="nav-roster" style="display:none;">阵容</a>
                <a href="#" class="nav-link" data-page="schedule" id="nav-schedule" style="display:none;">赛程</a>
                <a href="#" class="nav-link" data-page="leaderboard" id="nav-leaderboard" style="display:none;">排行榜</a>
                <a href="#" class="nav-link" data-page="training" id="nav-training" style="display:none;">训练</a>
                <a href="#" class="nav-link" data-page="trade" id="nav-trade" style="display:none;">交易</a>
            </div>
            <div class="nav-status" id="nav-status" style="display:none;">
                <span class="status-date" id="status-date"></span>
                <span class="status-team" id="status-team"></span>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>华夏篮球联赛模拟器 &copy; 2026 | 使用AI技术驱动的真实篮球经理游戏</p>
        </footer>
    </div>

    <!-- 加载提示 -->
    <div class="loading-overlay" id="loading-overlay" style="display:none;">
        <div class="loading-spinner"></div>
        <p class="loading-text">加载中...</p>
    </div>

    <!-- 消息提示 -->
    <div class="toast-container" id="toast-container"></div>

    <!-- 模态框容器 -->
    <div class="modal-overlay" id="modal-overlay" style="display:none;">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title"></h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
