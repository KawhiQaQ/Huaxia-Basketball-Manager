{% extends "base.html" %}

{% block title %}华夏篮球联赛教练模拟器 - 阵容管理{% endblock %}

{% block content %}
<div class="roster-container">
    <div class="roster-header">
        <div>
            <h1>阵容管理</h1>
            <p class="text-muted" id="roster-team-name">--</p>
        </div>
        <div>
            <button class="btn btn-secondary" onclick="GameApp.showPage('dashboard')">
                ← 返回控制台
            </button>
        </div>
    </div>

    <!-- 常规赛/季后赛/总数据切换按钮 -->
    <div class="card mb-2" id="roster-mode-card">
        <div class="card-body">
            <div class="roster-mode-toggle">
                <button class="btn btn-mode active" id="btn-roster-regular" onclick="GameApp.switchRosterMode('regular')">
                    📅 常规赛数据
                </button>
                <button class="btn btn-mode" id="btn-roster-playoff" onclick="GameApp.switchRosterMode('playoff')">
                    🏆 季后赛数据
                </button>
                <button class="btn btn-mode" id="btn-roster-total" onclick="GameApp.switchRosterMode('total')">
                    📈 总数据
                </button>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            👥 球员列表
            <span class="text-muted" style="font-weight: normal; font-size: 0.9rem;">
                (点击球员查看详情)
            </span>
        </div>
        <div class="card-body">
            <div class="table-container">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>球员</th>
                            <th>位置</th>
                            <th>年龄</th>
                            <th>总评</th>
                            <th>场次</th>
                            <th>场均得分</th>
                            <th>场均篮板</th>
                            <th>场均助攻</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="roster-body">
                        <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 球员详情模态框内容模板 -->
<script id="player-detail-template" type="text/template">
    <div class="player-detail">
        <div class="player-attributes">
            <h4>基础属性</h4>
            <div class="attribute-row">
                <span>进攻</span>
                <div class="attribute-bar">
                    <div class="attribute-fill" style="width: ${offense}%"></div>
                </div>
                <span>${offense}</span>
            </div>
            <div class="attribute-row">
                <span>防守</span>
                <div class="attribute-bar">
                    <div class="attribute-fill" style="width: ${defense}%"></div>
                </div>
                <span>${defense}</span>
            </div>
            <div class="attribute-row">
                <span>三分</span>
                <div class="attribute-bar">
                    <div class="attribute-fill" style="width: ${three_point}%"></div>
                </div>
                <span>${three_point}</span>
            </div>
            <div class="attribute-row">
                <span>篮板</span>
                <div class="attribute-bar">
                    <div class="attribute-fill" style="width: ${rebounding}%"></div>
                </div>
                <span>${rebounding}</span>
            </div>
            <div class="attribute-row">
                <span>传球</span>
                <div class="attribute-bar">
                    <div class="attribute-fill" style="width: ${passing}%"></div>
                </div>
                <span>${passing}</span>
            </div>
            <div class="attribute-row">
                <span>体力</span>
                <div class="attribute-bar">
                    <div class="attribute-fill" style="width: ${stamina}%"></div>
                </div>
                <span>${stamina}</span>
            </div>
        </div>
        <div class="player-season-stats">
            <h4>赛季场均数据</h4>
            <div class="stat-row">
                <span>出场次数</span>
                <span>${games_played}</span>
            </div>
            <div class="stat-row">
                <span>得分</span>
                <span>${avg_points}</span>
            </div>
            <div class="stat-row">
                <span>篮板</span>
                <span>${avg_rebounds}</span>
            </div>
            <div class="stat-row">
                <span>助攻</span>
                <span>${avg_assists}</span>
            </div>
            <div class="stat-row">
                <span>抢断</span>
                <span>${avg_steals}</span>
            </div>
            <div class="stat-row">
                <span>盖帽</span>
                <span>${avg_blocks}</span>
            </div>
            <div class="stat-row">
                <span>失误</span>
                <span>${avg_turnovers}</span>
            </div>
            <div class="stat-row">
                <span>上场时间</span>
                <span>${avg_minutes}</span>
            </div>
        </div>
    </div>
</script>

<style>
.roster-mode-toggle {
    display: flex;
    gap: 10px;
    justify-content: center;
}

.btn-mode {
    padding: 10px 24px;
    border: 2px solid var(--primary-color);
    background: transparent;
    color: var(--primary-color);
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-mode:hover {
    background: var(--primary-color);
    color: white;
}

.btn-mode.active {
    background: var(--primary-color);
    color: white;
}
</style>
{% endblock %}
