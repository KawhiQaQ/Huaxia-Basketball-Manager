{% extends "base.html" %}

{% block title %}华夏篮球联赛教练模拟器 - 选择球队{% endblock %}

{% block content %}
<div class="team-select-container">
    <div class="text-center mb-3">
        <h1>选择你的球队</h1>
        <p class="text-muted">选择一支球队开始你的教练生涯</p>
    </div>
    
    <div class="team-grid" id="team-grid">
        <!-- 球队卡片将通过JavaScript动态加载 -->
    </div>
    
    <div class="mt-3 text-center">
        <button class="btn btn-secondary" onclick="GameApp.showPage('menu')">
            ← 返回主菜单
        </button>
        <button class="btn btn-primary btn-lg" id="btn-confirm-team" disabled onclick="GameApp.startNewGame()">
            确认选择并开始游戏
        </button>
    </div>
</div>

<!-- 球队详情模态框 -->
<script id="team-card-template" type="text/template">
    <div class="card team-card" data-team-id="${id}" onclick="GameApp.selectTeam('${id}')">
        <div class="card-body">
            <div class="team-info">
                <div class="team-logo">🏀</div>
                <div>
                    <div class="team-name">${name}</div>
                    <div class="team-city">${city}</div>
                </div>
            </div>
            <div class="team-stats">
                <div class="team-stat">
                    <div class="team-stat-value">${roster_size}</div>
                    <div class="team-stat-label">球员数</div>
                </div>
                <div class="team-stat">
                    <div class="team-stat-value">${status}</div>
                    <div class="team-stat-label">状态</div>
                </div>
            </div>
        </div>
    </div>
</script>
{% endblock %}
